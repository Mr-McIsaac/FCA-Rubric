<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCA Feedback Snippet Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://www.fcae.ca/static/site-content/page-uploads/1/twitter.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Snippet Button Animations */
        .snippet-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .snippet-btn:active {
            transform: scale(0.97);
        }
        .snippet-selected {
            background-color: #4f46e5; /* Indigo 600 */
            color: white;
            border-color: #4f46e5;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }
        
        .toast-enter {
            animation: slideInBottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideInBottom {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>
</head>
<body class="p-4 md:p-8 h-screen flex flex-col overflow-hidden">
    
    <header class="text-center mb-8 flex-shrink-0">
        <h1 class="text-4xl font-black text-slate-900 mb-2 tracking-tight">FCA Feedback Builder</h1>
        <p class="text-slate-500 font-medium text-lg">Click snippets to generate a personalized feedback paragraph.</p>
    </header>

    <div class="max-w-7xl mx-auto w-full flex-1 flex flex-col lg:flex-row gap-8 overflow-hidden pb-4">
        
        <!-- Left Sidebar: The Output & Customization -->
        <div class="lg:w-1/3 flex flex-col gap-6 h-full overflow-y-auto custom-scrollbar pr-2">
            
            <!-- Student Setup -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex-shrink-0">
                <h2 class="text-lg font-bold text-slate-800 mb-4">Student Details</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Student Name</label>
                        <input type="text" id="studentName" placeholder="e.g. Lily" oninput="generateOutput()"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-semibold text-slate-700">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Greeting Style</label>
                        <select id="greetingStyle" onchange="generateOutput()" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-semibold text-slate-700 appearance-none">
                            <option value="Hi {name},">Hi [Name],</option>
                            <option value="Great work on this, {name}.">Great work on this, [Name].</option>
                            <option value="Feedback for {name}:">Feedback for [Name]:</option>
                            <option value="none">No greeting</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Final Output Area -->
            <div class="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 flex-1 flex flex-col min-h-[350px]">
                <div class="flex items-center justify-between mb-4 flex-shrink-0">
                    <h2 class="text-lg font-bold text-indigo-900">Final Paragraph</h2>
                    <span id="wordCount" class="text-xs font-bold text-indigo-400 uppercase tracking-wider bg-white px-2 py-1 rounded-md">0 words</span>
                </div>
                
                <textarea id="finalOutput" class="w-full flex-1 p-4 bg-white border border-indigo-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none text-slate-700 leading-relaxed shadow-inner" placeholder="Your generated feedback will appear here..."></textarea>
                
                <div class="mt-4 flex gap-3 flex-shrink-0">
                    <button onclick="clearAll()" class="px-5 py-3 rounded-xl font-bold text-slate-500 bg-white border border-slate-200 hover:bg-slate-50 hover:text-rose-500 transition-colors">
                        Clear
                    </button>
                    <button onclick="copyToClipboard()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-95 flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                            <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                        </svg>
                        Copy Feedback
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Main Area: The Snippet Board -->
        <div class="lg:w-2/3 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 h-full flex flex-col">
            <div class="flex items-center justify-between mb-6 flex-shrink-0">
                <h2 class="text-2xl font-bold text-slate-800">Snippet Board</h2>
                <div class="text-sm font-medium text-slate-400 bg-slate-100 px-3 py-1 rounded-full">
                    Selected: <span id="selectedCount" class="font-bold text-slate-700">0</span>
                </div>
            </div>

            <!-- Categories Container -->
            <div id="categoriesContainer" class="flex-1 overflow-y-auto custom-scrollbar pr-4 space-y-8 pb-10">
                <!-- Javascript will inject categories here -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full font-bold shadow-2xl hidden z-50 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        Copied to clipboard!
    </div>

    <script>
        // Data Structure for Snippets
        const snippetData = [
            {
                category: "Creativity & Concept 🌟",
                color: "emerald",
                snippets: [
                    "Your project shows a lot of originality and creative thinking.",
                    "I love the unique concept you developed for this piece.",
                    "You did a great job brainstorming and executing a fresh idea.",
                    "The composition and visual balance of your work are excellent.",
                    "Your project effectively solves the design/technical problem presented in the prompt.",
                    "You really thought outside the box for this assignment!"
                ]
            },
            {
                category: "Technical Execution & Skill 🛠️",
                color: "blue",
                snippets: [
                    "You demonstrated strong technical skills in this project.",
                    "Great attention to detail in the construction and design of your work.",
                    "You used the tools/software highly effectively to achieve your desired result.",
                    "The overall craftsmanship of your final piece is outstanding.",
                    "Your code/design is clean, well-organized, and functions exactly as intended."
                ]
            },
            {
                category: "Presentation & Communication 🗣️",
                color: "indigo",
                snippets: [
                    "You spoke clearly and confidently during your presentation.",
                    "Your visual aids were well-designed and really enhanced your message.",
                    "You did a great job explaining your creative process to the class.",
                    "You handled the feedback and Q&A session very well.",
                    "Try to make a bit more eye contact with the audience next time."
                ]
            },
            {
                category: "Areas for Growth 🌱",
                color: "amber",
                snippets: [
                    "Try to push your initial ideas further before settling on a final concept.",
                    "Pay a bit more attention to the finishing details to really polish your final product.",
                    "In the future, try to manage your time more effectively during the planning phase.",
                    "Consider how different color choices or materials might change the mood of your work.",
                    "Make sure to test your project more thoroughly to catch minor bugs or structural issues."
                ]
            },
            {
                category: "Requirements & Workflow 📐",
                color: "rose",
                snippets: [
                    "Make sure you review the project rubric to ensure all requirements are met.",
                    "Your project is missing a few of the required elements we discussed.",
                    "Great job documenting your progress and workflow.",
                    "Remember to save and organize your files according to the class naming conventions.",
                    "Excellent job keeping your workspace clean and organized."
                ]
            },
            {
                category: "Closing Remarks 🏁",
                color: "emerald",
                snippets: [
                    "Overall, a fantastic effort on this project!",
                    "You are definitely developing a great eye for design.",
                    "Please come see me if you need help troubleshooting these technical issues.",
                    "Keep up the great work and keep pushing your boundaries!",
                    "I can see how much effort and time you put into this.",
                    "I'm really looking forward to seeing what you create next."
                ]
            }
        ];

        let selectedSnippets = new Set();
        let customEdits = false; // Tracks if the user manually typed in the text area

        // Initialize UI
        function init() {
            renderCategories();
            
            // Listen for manual edits in the textarea
            document.getElementById('finalOutput').addEventListener('input', () => {
                customEdits = true;
                updateWordCount();
            });
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';

            snippetData.forEach((section, sIndex) => {
                const sectionDiv = document.createElement('div');
                
                // Color mapping for category titles
                const colorMap = {
                    'emerald': 'text-emerald-600',
                    'amber': 'text-amber-600',
                    'rose': 'text-rose-600',
                    'blue': 'text-blue-600',
                    'indigo': 'text-indigo-600'
                };
                
                sectionDiv.innerHTML = `
                    <h3 class="text-sm font-black uppercase tracking-widest ${colorMap[section.color]} mb-3 flex items-center gap-2">
                        ${section.category}
                        <div class="h-px flex-1 bg-slate-100 ml-2"></div>
                    </h3>
                    <div class="flex flex-wrap gap-2">
                        ${section.snippets.map((snippet, i) => `
                            <button 
                                id="btn-${sIndex}-${i}"
                                onclick="toggleSnippet('${sIndex}-${i}', \`${snippet}\`)"
                                class="snippet-btn text-left px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-xl text-sm font-medium hover:border-indigo-300 hover:bg-indigo-50 leading-snug max-w-full">
                                ${snippet}
                            </button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(sectionDiv);
            });
        }

        function toggleSnippet(btnId, text) {
            const btn = document.getElementById(`btn-${btnId}`);
            
            if (selectedSnippets.has(text)) {
                selectedSnippets.delete(text);
                btn.classList.remove('snippet-selected');
            } else {
                selectedSnippets.add(text);
                btn.classList.add('snippet-selected');
            }

            document.getElementById('selectedCount').innerText = selectedSnippets.size;
            customEdits = false; // Reset custom edits flag when using the builder
            generateOutput();
        }

        function generateOutput() {
            if (customEdits) return; // Don't overwrite if the teacher typed custom text

            const studentName = document.getElementById('studentName').value.trim();
            const greetingTemplate = document.getElementById('greetingStyle').value;
            const outputArea = document.getElementById('finalOutput');

            let finalString = "";

            // 1. Add Greeting
            if (greetingTemplate !== "none") {
                if (studentName) {
                    finalString += greetingTemplate.replace('{name}', studentName) + "\n\n";
                } else {
                    // Fallback if no name entered but a greeting is selected
                    finalString += greetingTemplate.replace(', {name}', '').replace(' {name}', '').replace('{name}', 'Student') + "\n\n";
                }
            }

            // 2. Add Snippets
            if (selectedSnippets.size > 0) {
                // Convert set to array and join with a space
                finalString += Array.from(selectedSnippets).join(" ");
            }

            outputArea.value = finalString;
            updateWordCount();
        }

        function updateWordCount() {
            const text = document.getElementById('finalOutput').value.trim();
            const count = text === "" ? 0 : text.split(/\s+/).length;
            document.getElementById('wordCount').innerText = `${count} word${count !== 1 ? 's' : ''}`;
        }

        function clearAll() {
            selectedSnippets.clear();
            document.getElementById('studentName').value = '';
            document.getElementById('greetingStyle').value = 'Hi {name},';
            customEdits = false;
            
            // Remove styling from all buttons
            document.querySelectorAll('.snippet-selected').forEach(btn => {
                btn.classList.remove('snippet-selected');
            });
            
            document.getElementById('selectedCount').innerText = '0';
            generateOutput();
        }

        function copyToClipboard() {
            const outputArea = document.getElementById('finalOutput');
            
            if (outputArea.value.trim() === '') {
                // Briefly shake the textarea if it's empty
                outputArea.classList.add('border-rose-500', 'bg-rose-50');
                setTimeout(() => outputArea.classList.remove('border-rose-500', 'bg-rose-50'), 300);
                return;
            }

            outputArea.select();
            document.execCommand('copy');
            
            // Show Toast
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            toast.classList.add('toast-enter');
            
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast-enter');
            }, 2500);
        }

        window.onload = init;
    </script>
</body>
</html>
